<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quick Define</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        width: 260px;
        padding: 16px;
        margin: 0;
        color: #1a1a1a;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 4px 0;
      }

      .version {
        font-size: 12px;
        color: #888;
        margin: 0 0 12px 0;
      }

      p {
        font-size: 13px;
        color: #555;
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Quick Define</h1>
    <p class="version" id="version"></p>
    <p>Highlight any word on a webpage to see its definition instantly.</p>
    <script src="popup.js"></script>
  </body>
</html>
